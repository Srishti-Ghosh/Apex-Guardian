services:
  # 1. The Message Broker
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.2.1
    container_name: redpanda-guardian
    command:
      - redpanda start
      - --smp 1
      - --overprovisioned
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
    ports:
      - "19092:19092"
    volumes:
      - ./data/redpanda:/var/lib/redpanda/data
    networks:
      - guardian-network
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Redpanda Console (Optional UI for the broker)
  console:
    image: docker.redpanda.com/redpandadata/console:v2.3.1
    container_name: redpanda-console
    entrypoint: /bin/sh
    command: -c "echo \"$$CONSOLE_CONFIG_FILE\" > /tmp/config.yml; /app/console"
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
      CONSOLE_CONFIG_FILE: |
        kafka:
          brokers: ["redpanda:9092"]
    ports:
      - "8080:8080"
    networks:
      - guardian-network
    depends_on:
      - redpanda

  # 3. The Columnar Database
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse-guardian
    environment:
      - CLICKHOUSE_PASSWORD=apex_admin
    ports:
      - "8123:8123" 
      - "9000:9000" 
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - ./data/clickhouse:/var/lib/clickhouse
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql 
    networks:
      - guardian-network

  # 4. Observability Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: grafana-guardian
    environment:
      - GF_INSTALL_PLUGINS=grafana-clickhouse-datasource
    ports:
      - "3000:3000"
    volumes:
      # Mount the provisioning config
      - ./grafana/provisioning/dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml
      # Mount the actual dashboard JSON files
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - guardian-network
    depends_on:
      - clickhouse

  # 5. Microservice: Producer
  producer:
    build: .
    container_name: python-producer
    command: python producer.py
    env_file:
      - .env
    environment:
      - REDPANDA_BROKERS=redpanda:9092
    networks:
      - guardian-network
    depends_on:
      redpanda:
        condition: service_healthy

  # 6. Microservice: Consumer
  consumer:
    build: .
    container_name: python-consumer
    command: python consumer.py
    env_file:
      - .env
    environment:
      - REDPANDA_BROKERS=redpanda:9092
      - CLICKHOUSE_HOST=clickhouse
    networks:
      - guardian-network
    depends_on:
      redpanda:
        condition: service_healthy
      clickhouse:
        condition: service_started

  # 7. Microservice: Drift Monitor
  drift-monitor:
    build: .
    container_name: python-drift-monitor
    command: python drift_monitor.py
    env_file:
      - .env
    environment:
      - REDPANDA_BROKERS=redpanda:9092
      - CLICKHOUSE_HOST=clickhouse
    networks:
      - guardian-network
    depends_on:
      redpanda:
        condition: service_healthy
      clickhouse:
        condition: service_started

networks:
  guardian-network:
    driver: bridge